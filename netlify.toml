[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── SPA fallback: path ที่ไม่ใช่ไฟล์จริง → index.html (React Router) ──
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── อย่า cache service worker ──
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
